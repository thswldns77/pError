<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pError Load Panel</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230d7c66'/%3E%3Cpath d='M9 22V8h8.3c3.2 0 5.7 2.1 5.7 5.2 0 3.2-2.5 5.2-5.7 5.2H13v3.6H9Zm4-7.2h4c1.2 0 2-.6 2-1.6s-.8-1.6-2-1.6h-4v3.2Z' fill='white'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f3;
        --surface: #ffffff;
        --surface-strong: #f0f4f6;
        --ink: #1e272c;
        --muted: #657279;
        --line: #d8e0e3;
        --accent: #0d7c66;
        --accent-strong: #075f50;
        --danger: #c2413a;
        --warn: #b4761b;
        --ok: #16734f;
        --shadow: 0 16px 42px rgba(30, 39, 44, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(13, 124, 102, 0.08), transparent 34%),
          linear-gradient(225deg, rgba(46, 90, 111, 0.1), transparent 32%),
          var(--bg);
        color: var(--ink);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .page {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 36px 0 48px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent-strong);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 58px);
        line-height: 1;
        letter-spacing: 0;
      }

      .subtitle {
        max-width: 620px;
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.65;
      }

      .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .nav-links a,
      .ghost-button {
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.74);
        color: var(--ink);
        padding: 8px 12px;
        text-decoration: none;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 0.96fr) minmax(330px, 0.64fr);
        gap: 18px;
        align-items: start;
      }

      .panel,
      .metric,
      .log-panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: var(--shadow);
      }

      .panel {
        padding: 22px;
      }

      .panel + .panel {
        margin-top: 18px;
      }

      .section-title {
        margin: 0 0 16px;
        font-size: 18px;
        letter-spacing: 0;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .field-grid.full {
        grid-template-columns: 1fr;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        padding: 9px 11px;
        outline: none;
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(13, 124, 102, 0.16);
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        padding: 10px 14px;
        font-weight: 800;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .danger-button {
        background: var(--danger);
      }

      .danger-button:hover {
        background: #9f302b;
      }

      .ghost-button {
        background: var(--surface);
        color: var(--ink);
        font-weight: 800;
      }

      .status-line {
        min-height: 24px;
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .status-line.ok {
        color: var(--ok);
      }

      .status-line.warn {
        color: var(--warn);
      }

      .status-line.error {
        color: var(--danger);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .metric {
        min-height: 104px;
        padding: 16px;
        box-shadow: none;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .metric strong {
        display: block;
        margin-top: 8px;
        font-size: 30px;
        letter-spacing: 0;
      }

      .progress {
        width: 100%;
        height: 10px;
        margin: 18px 0 0;
        overflow: hidden;
        border-radius: 999px;
        background: var(--surface-strong);
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #2e5a6f);
        transition: width 0.18s ease;
      }

      .log-panel {
        margin-top: 18px;
        overflow: hidden;
        box-shadow: none;
      }

      .log-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 16px;
        border-bottom: 1px solid var(--line);
        background: var(--surface-strong);
      }

      .log-title h2 {
        margin: 0;
        font-size: 15px;
      }

      .log {
        max-height: 280px;
        overflow: auto;
      }

      .log-row {
        display: grid;
        grid-template-columns: 86px 1fr 76px;
        gap: 10px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
      }

      .log-row:last-child {
        border-bottom: 0;
      }

      .log-row b {
        color: var(--ink);
      }

      .badge {
        justify-self: end;
        border-radius: 999px;
        padding: 3px 8px;
        background: #e8f4ef;
        color: var(--ok);
        font-weight: 800;
      }

      .badge.error {
        background: #fbe8e6;
        color: var(--danger);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }

      @media (max-width: 860px) {
        .topbar {
          display: block;
        }

        .nav-links {
          justify-content: flex-start;
          margin-top: 18px;
        }

        .grid,
        .field-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <p class="eyebrow">pError Demo</p>
          <h1>Load Panel</h1>
          <p class="subtitle">
            S3 정적 페이지에서 ALB API로 요청을 보내고, pError 대시보드에서 이벤트 증가와 이슈 그룹핑을 확인합니다.
          </p>
        </div>
        <nav class="nav-links" aria-label="관련 링크">
          <a href="./">대시보드</a>
          <a id="healthLink" href="http://localhost:4000/health" target="_blank" rel="noreferrer">API Health</a>
        </nav>
      </header>

      <section class="grid">
        <div>
          <section class="panel">
            <h2 class="section-title">연결</h2>
            <form id="connectionForm">
              <input class="sr-only" type="text" autocomplete="username" value="pError-admin" tabindex="-1" aria-hidden="true" />
              <div class="field-grid full">
                <label>
                  API Base URL
                  <input id="apiBaseUrl" type="url" autocomplete="url" placeholder="http://localhost:4000" />
                </label>
              </div>
              <div class="field-grid">
                <label>
                  관리자 비밀번호
                  <input id="adminPassword" type="password" autocomplete="current-password" placeholder="서비스 생성 시 사용" />
                </label>
                <label>
                  Service API Key
                  <input id="apiKey" type="password" autocomplete="off" placeholder="perror_..." />
                </label>
              </div>
              <div class="button-row">
                <button id="createServiceButton" type="button">테스트 서비스 생성</button>
                <button id="checkHealthButton" class="ghost-button" type="button">Health 확인</button>
              </div>
            </form>
            <p id="connectionStatus" class="status-line">대기 중</p>
          </section>

          <section class="panel">
            <h2 class="section-title">부하 실행</h2>
            <div class="field-grid">
              <label>
                테스트 종류
                <select id="testMode">
                  <option value="event">에러 이벤트 수집</option>
                  <option value="mixed">혼합 요청</option>
                  <option value="health">Health 요청</option>
                </select>
              </label>
              <label>
                요청 수
                <select id="requestCount">
                  <option value="10">10</option>
                  <option value="30" selected>30</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                  <option value="300">300</option>
                </select>
              </label>
              <label>
                동시 요청
                <select id="concurrency">
                  <option value="1">1</option>
                  <option value="3">3</option>
                  <option value="5" selected>5</option>
                  <option value="10">10</option>
                  <option value="20">20</option>
                </select>
              </label>
              <label>
                에러 메시지
                <select id="errorMessage">
                  <option value="Database connection failed">Database connection failed</option>
                  <option value="Payment queue timeout">Payment queue timeout</option>
                  <option value="Inventory sync failed">Inventory sync failed</option>
                  <option value="Background job promise rejected">Background job promise rejected</option>
                </select>
              </label>
            </div>
            <div class="button-row">
              <button id="runButton" type="button">실행</button>
              <button id="stopButton" class="danger-button" type="button" disabled>중지</button>
            </div>
            <div class="progress" role="progressbar" aria-label="진행률" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <div id="progressBar" class="progress-bar"></div>
            </div>
            <p id="runStatus" class="status-line">실행 전</p>
          </section>
        </div>

        <aside>
          <section class="metrics" aria-label="테스트 결과">
            <div class="metric">
              <span>완료</span>
              <strong id="completedMetric">0</strong>
            </div>
            <div class="metric">
              <span>성공률</span>
              <strong id="successRateMetric">0%</strong>
            </div>
            <div class="metric">
              <span>평균 응답</span>
              <strong id="avgMetric">0ms</strong>
            </div>
            <div class="metric">
              <span>p95</span>
              <strong id="p95Metric">0ms</strong>
            </div>
          </section>

          <section class="log-panel">
            <div class="log-title">
              <h2>최근 요청</h2>
              <button id="clearLogButton" class="ghost-button" type="button">비우기</button>
            </div>
            <div id="log" class="log" aria-live="polite"></div>
          </section>
        </aside>
      </section>
    </main>

    <script>
      const query = new URLSearchParams(window.location.search)
      const fallbackApiBaseUrl = "http://localhost:4000"
      const elements = {
        adminPassword: document.querySelector("#adminPassword"),
        apiBaseUrl: document.querySelector("#apiBaseUrl"),
        apiKey: document.querySelector("#apiKey"),
        avgMetric: document.querySelector("#avgMetric"),
        checkHealthButton: document.querySelector("#checkHealthButton"),
        clearLogButton: document.querySelector("#clearLogButton"),
        completedMetric: document.querySelector("#completedMetric"),
        concurrency: document.querySelector("#concurrency"),
        connectionForm: document.querySelector("#connectionForm"),
        connectionStatus: document.querySelector("#connectionStatus"),
        createServiceButton: document.querySelector("#createServiceButton"),
        errorMessage: document.querySelector("#errorMessage"),
        healthLink: document.querySelector("#healthLink"),
        log: document.querySelector("#log"),
        p95Metric: document.querySelector("#p95Metric"),
        progressBar: document.querySelector("#progressBar"),
        requestCount: document.querySelector("#requestCount"),
        runButton: document.querySelector("#runButton"),
        runStatus: document.querySelector("#runStatus"),
        stopButton: document.querySelector("#stopButton"),
        successRateMetric: document.querySelector("#successRateMetric"),
        testMode: document.querySelector("#testMode"),
      }

      const state = {
        abort: false,
        completed: 0,
        failed: 0,
        latencies: [],
        running: false,
        startedAt: 0,
        total: 0,
      }

      function normalizeBaseUrl(value) {
        return value.trim().replace(/\/+$/, "")
      }

      async function runtimeApiBaseUrl() {
        try {
          const response = await fetch("./runtime-config.json", { cache: "no-store" })
          if (!response.ok) {
            return null
          }
          const config = await response.json()
          return typeof config.apiBaseUrl === "string" ? config.apiBaseUrl : null
        } catch (_error) {
          return null
        }
      }

      async function defaultApiBaseUrl() {
        const queryApiBaseUrl = query.get("api")
        if (queryApiBaseUrl) {
          return normalizeBaseUrl(queryApiBaseUrl)
        }

        const deployedApiBaseUrl = await runtimeApiBaseUrl()
        if (deployedApiBaseUrl) {
          return normalizeBaseUrl(deployedApiBaseUrl)
        }

        return normalizeBaseUrl(localStorage.getItem("perror-load-api") || fallbackApiBaseUrl)
      }

      function apiBaseUrl() {
        return normalizeBaseUrl(elements.apiBaseUrl.value)
      }

      function setStatus(element, message, tone = "") {
        element.textContent = message
        element.className = `status-line ${tone}`.trim()
      }

      function setRunning(value) {
        state.running = value
        elements.runButton.disabled = value
        elements.stopButton.disabled = !value
        elements.createServiceButton.disabled = value
        elements.checkHealthButton.disabled = value
      }

      function updateHealthLink() {
        const baseUrl = apiBaseUrl()
        elements.healthLink.href = baseUrl ? `${baseUrl}/health` : "#"
      }

      function updateMetrics() {
        const success = state.completed - state.failed
        const successRate = state.completed === 0 ? 0 : Math.round((success / state.completed) * 100)
        const sorted = [...state.latencies].sort((a, b) => a - b)
        const totalLatency = state.latencies.reduce((sum, value) => sum + value, 0)
        const average = state.latencies.length === 0 ? 0 : Math.round(totalLatency / state.latencies.length)
        const p95Index = sorted.length === 0 ? 0 : Math.ceil(sorted.length * 0.95) - 1
        const p95 = sorted.length === 0 ? 0 : Math.round(sorted[p95Index])
        const progress = state.total === 0 ? 0 : Math.round((state.completed / state.total) * 100)

        elements.completedMetric.textContent = `${state.completed}/${state.total}`
        elements.successRateMetric.textContent = `${successRate}%`
        elements.avgMetric.textContent = `${average}ms`
        elements.p95Metric.textContent = `${p95}ms`
        elements.progressBar.style.width = `${progress}%`
        elements.progressBar.parentElement.setAttribute("aria-valuenow", String(progress))
      }

      function addLog(path, status, latency, failed, instanceId = null) {
        const row = document.createElement("div")
        row.className = "log-row"
        const time = document.createElement("b")
        time.textContent = new Date().toLocaleTimeString("ko-KR", { hour12: false })
        const detail = document.createElement("span")
        detail.textContent = instanceId
          ? `${path} · ${Math.round(latency)}ms · ${instanceId}`
          : `${path} · ${Math.round(latency)}ms`
        const badge = document.createElement("span")
        badge.className = `badge ${failed ? "error" : ""}`.trim()
        badge.textContent = String(status)
        row.append(time, detail, badge)
        elements.log.prepend(row)
        while (elements.log.children.length > 30) {
          elements.log.lastElementChild.remove()
        }
      }

      async function timedFetch(path, options = {}) {
        const startedAt = performance.now()
        try {
          const response = await fetch(`${apiBaseUrl()}${path}`, options)
          const latency = performance.now() - startedAt
          const text = await response.text()
          const body = text.length > 0 ? JSON.parse(text) : null
          const instanceId = body !== null && typeof body.instanceId === "string" ? body.instanceId : null
          return { failed: !response.ok, instanceId, latency, path, status: response.status }
        } catch (_error) {
          return { failed: true, instanceId: null, latency: performance.now() - startedAt, path, status: "ERR" }
        }
      }

      function eventPayload(index) {
        const message = elements.errorMessage.value
        const path = index % 3 === 0 ? "/jobs/nightly-sync" : index % 3 === 1 ? "/api/orders" : "/api/payments"
        return {
          environment: "html-load-test",
          hostname: window.location.hostname || "local-file",
          message,
          method: "POST",
          path,
          release: "load-panel@1.0.0",
          requestId: `load-${Date.now()}-${index}`,
          stack: `Error: ${message}\n    at load-test.html:${300 + (index % 40)}:7`,
          statusCode: index % 5 === 0 ? 503 : 500,
        }
      }

      async function createService() {
        const password = elements.adminPassword.value.trim()
        if (password.length === 0) {
          setStatus(elements.connectionStatus, "관리자 비밀번호를 입력하세요.", "warn")
          return
        }

        setStatus(elements.connectionStatus, "서비스 생성 중...", "warn")
        try {
          const login = await fetch(`${apiBaseUrl()}/api/auth/login`, {
            body: JSON.stringify({ password }),
            headers: { "Content-Type": "application/json" },
            method: "POST",
          })
          if (!login.ok) {
            throw new Error(`login ${login.status}`)
          }
          const loginBody = await login.json()
          const service = await fetch(`${apiBaseUrl()}/api/services`, {
            body: JSON.stringify({
              environment: "html-load-test",
              name: `html-load-panel-${new Date().toISOString().slice(11, 19)}`,
            }),
            headers: {
              Authorization: `Bearer ${loginBody.token}`,
              "Content-Type": "application/json",
            },
            method: "POST",
          })
          if (!service.ok) {
            throw new Error(`service ${service.status}`)
          }
          const serviceBody = await service.json()
          elements.apiKey.value = serviceBody.apiKey
          setStatus(elements.connectionStatus, `${serviceBody.name} 생성 완료`, "ok")
        } catch (error) {
          setStatus(elements.connectionStatus, `서비스 생성 실패: ${error.message}`, "error")
        }
      }

      async function checkHealth() {
        setStatus(elements.connectionStatus, "Health 확인 중...", "warn")
        const result = await timedFetch("/health")
        addLog("/health", result.status, result.latency, result.failed, result.instanceId)
        setStatus(
          elements.connectionStatus,
          result.failed
            ? `Health 실패: ${result.status}`
            : `Health 정상: ${Math.round(result.latency)}ms · ${result.instanceId ?? "instance unknown"}`,
          result.failed ? "error" : "ok",
        )
      }

      async function runOne(index) {
        const mode = elements.testMode.value
        if (mode === "health" || (mode === "mixed" && index % 4 === 0)) {
          return timedFetch("/health")
        }

        return timedFetch("/api/events", {
          body: JSON.stringify(eventPayload(index)),
          headers: {
            "Content-Type": "application/json",
            "x-perror-key": elements.apiKey.value.trim(),
          },
          method: "POST",
        })
      }

      async function runLoad() {
        const mode = elements.testMode.value
        if (apiBaseUrl().length === 0) {
          setStatus(elements.runStatus, "API URL을 입력하세요.", "warn")
          return
        }
        if (mode !== "health" && elements.apiKey.value.trim().length === 0) {
          setStatus(elements.runStatus, "Service API Key가 필요합니다.", "warn")
          return
        }

        state.abort = false
        state.completed = 0
        state.failed = 0
        state.latencies = []
        state.total = Math.min(Number(elements.requestCount.value), 300)
        state.startedAt = performance.now()
        updateMetrics()
        setRunning(true)
        setStatus(elements.runStatus, "실행 중...", "warn")

        const concurrency = Math.min(Number(elements.concurrency.value), 20)
        let nextIndex = 0

        async function worker() {
          while (!state.abort && nextIndex < state.total) {
            const currentIndex = nextIndex
            nextIndex += 1
            const result = await runOne(currentIndex)
            state.completed += 1
            if (result.failed) {
              state.failed += 1
            }
            state.latencies.push(result.latency)
            addLog(result.path, result.status, result.latency, result.failed, result.instanceId)
            updateMetrics()
          }
        }

        await Promise.all(Array.from({ length: concurrency }, () => worker()))
        setRunning(false)

        const elapsed = Math.max((performance.now() - state.startedAt) / 1000, 0.1)
        const rate = Math.round((state.completed / elapsed) * 10) / 10
        setStatus(
          elements.runStatus,
          state.abort ? `중지됨 · ${state.completed}건 · ${rate} req/s` : `완료 · ${state.completed}건 · ${rate} req/s`,
          state.failed > 0 ? "warn" : "ok",
        )
      }

      elements.apiBaseUrl.value = fallbackApiBaseUrl
      updateHealthLink()
      elements.connectionForm.addEventListener("submit", (event) => {
        event.preventDefault()
      })
      elements.apiBaseUrl.addEventListener("change", () => {
        localStorage.setItem("perror-load-api", apiBaseUrl())
        updateHealthLink()
      })
      elements.createServiceButton.addEventListener("click", () => void createService())
      elements.checkHealthButton.addEventListener("click", () => void checkHealth())
      elements.runButton.addEventListener("click", () => void runLoad())
      elements.stopButton.addEventListener("click", () => {
        state.abort = true
        setStatus(elements.runStatus, "중지 요청됨...", "warn")
      })
      elements.clearLogButton.addEventListener("click", () => {
        elements.log.replaceChildren()
      })
      updateMetrics()
      void defaultApiBaseUrl().then((apiUrl) => {
        elements.apiBaseUrl.value = apiUrl
        updateHealthLink()
